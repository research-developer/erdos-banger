notes: "[Exa] Now on home page\n\n## NASA/ADS\n\n## Hadwiger's conjecture for graphs\
  \ with infinite chromatic number\n\n- [van der Zypen, Dominic] \n\n#### Abstract\n\
  \nWe construct a connected graph H such that (1) \\\\chi(H) = \\\\omega; (2) K\\\
  _\\\\omega, the complete graph on \\\\omega points, is not a minor of H. Therefore\
  \ Hadwiger's conjecture does not hold for graphs with infinite coloring number.\n\
