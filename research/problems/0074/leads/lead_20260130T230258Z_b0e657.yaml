notes: '[Exa] A simple algorithm for edge-coloring bipartite multigraphs

  Noga Alon ∗

  It is well known that the chromatic index of any bipartite multigraph G with n vertices
  and m

  edges is equal to its maximum degree k. The best algorithm currently known for finding
  a proper

  k-edge-coloring of such a multigraph runs in time O(m log k), see [2], or the forthcoming
  book [6], and

