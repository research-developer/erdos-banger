enriched_abstract: How large must the chromatic number of a graph be, in terms of
  the graph's maximum degree, to ensure that the most efficient way to reduce the
  chromatic number by removing vertices is to remove an independent set? By a reduction
  to a powerful, known stability form of Brooks' theorem, we answer this question
  precisely, determining the threshold to within two values (and indeed sometimes
  a unique value) for graphs of sufficiently large maximum degree.
