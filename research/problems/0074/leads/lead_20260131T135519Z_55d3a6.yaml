notes: '[Exa] ADVANCES IN COMBINATORICS, 2025:2, 19 pp.

  www.advancesincombinatorics.com

  Bounded Twin-Width Graphs are

  Polynomially χ-Bounded

  Romain Bourneuf Stéphan Thomassé*

  Received 28 March 2023; Published 13 February 2025

  Abstract: We show that every graph with twin-width t has chromatic number O(ω

  kt)

  for some integer kt, where ω denotes the clique number. This extends a quasi-polynomial

  bound from Pilipczuk and Sokołowski and generalizes a result for bounded clique-width

  graphs by Bonamy and Pilipczuk.'
