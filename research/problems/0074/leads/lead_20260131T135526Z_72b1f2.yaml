notes: '[Exa] A class of graphs with large rankwidth

  Chính T. Hoàng∗ and Nicolas Trotignon†

  August 31, 2023

  Abstract

  We describe several graphs with arbitrarily large rankwidth (or equivalently with

  arbitrarily large cliquewidth). Korpelainen, Lozin, and Mayhill [Split permutation

  graphs, Graphs and Combinatorics, 30(3):633–646, 2014] proved that there exist split

  graphs with Dilworth number 2 with arbitrarily large rankwidth, but without explicitly

  constructing them. We provide an explicit construction. Maff'
