notes: "[Exa] Fast Approximation Algorithms for Cut-based Problems in\nUndirected\
  \ Graphs\nAleksander Mądry∗\nMassachusetts Institute of Technology\nmadry@mit.edu\n\
  Abstract\nWe present a general method of designing fast approximation algorithms\
  \ for cut-based min\x02imization problems in undirected graphs. In particular, we\
  \ develop a technique that given\nany such problem that can be approximated quickly\
  \ on trees, allows approximating it almost\nas quickly on general graphs while only\
  \ losing a poly-logarithmic factor in t"
