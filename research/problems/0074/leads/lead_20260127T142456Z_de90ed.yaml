notes: '[Exa] The chromatic profile of locally bipartite graphs

  Freddie Illingworth*

  24 May 2022

  Abstract

  In 1973, Erd˝os and Simonovits asked whether every n-vertex triangle-free graph
  with minimum

  degree greater than 1/3 · n is 3-colourable. This question initiated the study of
  the chromatic profile

  of triangle-free graphs: for each k, what minimum degree guarantees that a triangle-free
  graph is

  k-colourable. This problem has a rich history which culminated in its complete solution
  by Brandt

  and Thomassé. M'
