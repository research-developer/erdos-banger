  \ [Submit manuscript] \n\n## Abstract\n\nIt is shown that there exists a positive\
  \ _c_ so that for any large integer _m_, any graph with 2 _m_ 2edges contains a\
  \ bipartite subgraph with at least\\\\(m^2 + m/2 + c\\\\sqrt m\\\\) edges. This\
  \ is tight up to the constant _c_ and settles a problem of Erdös. It is also proved"
