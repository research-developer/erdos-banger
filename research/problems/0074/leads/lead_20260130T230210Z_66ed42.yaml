notes: '[Exa] arXiv:1902.08177v2 [math.LO] 25 Feb 2019

  ON THE GROWTH RATE OF CHROMATIC NUMBERS OF

  FINITE SUBGRAPHS

  CHRIS LAMBIE-HANSON

  Abstract. We prove that, for every function f : N → N, there is a graph G

  with uncountable chromatic number such that, for every k ∈ N with k ≥ 3,

  every subgraph of G with fewer than f(k) vertices has chromatic number less

  than k. This answers a question of Erd˝os, Hajnal, and Szemeredi.

