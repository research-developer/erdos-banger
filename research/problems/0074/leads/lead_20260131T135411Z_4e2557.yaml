notes: '[Exa] # Fractional coloring


  Graph coloring where graph elements are assigned sets of colors


  Fractional coloring is a topic in a branch of [graph theory] known as [fractional
  graph theory]. It is a generalization of ordinary [graph coloring]. In a traditional
  graph coloring, each vertex in a graph is assigned some color, and adjacent vertices
  — those connected by edges — must be assigned different colors. In a fractional
  coloring however, a set of colors is assigned to each'
