  \ [Aims and scope] [Submit manuscript] \n\n## Abstract\n\nWe show that, given an\
  \ infinite cardinal _μ_, a graph has colouring number at most _μ_ if and only if\
  \ it contains neither of two types of subgraph. We also show that every graph with\
  \ infinite colouring number has a well-ordering of its vertices"
