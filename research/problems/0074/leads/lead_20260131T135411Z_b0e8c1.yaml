notes: '[Exa] The game chromatic number of random graphs

  Tom Bohman∗ Alan Frieze† Benny Sudakov ‡

  Abstract

  Given a graph G and an integer k, two players take turns coloring the vertices of
  G one by one

  using k colors so that neighboring vertices get different colors. The first player
  wins iff at the end of

  the game all the vertices of G are colored. The game chromatic number χg(G) is the
  minimum k for

  which the first player has a winning strategy. In this paper we analyze the asymptotic
  behavior of

  this param'
