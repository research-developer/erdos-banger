notes: "[Exa] # [Additive approximation for edge-deletion problems] \n\nPages 371-411\
  \ from Volume 170 (2009), Issue 1 by Noga Alon, Asaf Shapira, Benny Sudakov\n\n\
  ### Abstract\n\nA graph property is _monotone_ if it is closed under removal of\
  \ vertices and edges. In this paper we consider the following algorithmic problem,\
  \ called the edge-deletion problem; given a monotone property $\\\\mathcal{P}$ and\
  \ a graph $G$, compute the smallest number of edge deletions that are needed in\
  \ order to turn $G$ into a graph"
