notes: "[Exa] SOLVING SPARSE RANDOM INSTANCES OF MAX CUT\nAND MAX 2-CSP IN LINEAR\
  \ EXPECTED TIME\nALEXANDER D. SCOTT AND GREGORY B. SORKIN\nAbstract. We show that\
  \ a maximum cut of a random graph below the giant\x02component threshold can be\
  \ found in linear space and linear expected time\nby a simple algorithm. In fact,\
  \ the algorithm solves a more general class\nof problems, namely binary 2-variable\
  \ constraint satisfaction problems. In\naddition to Max Cut, such Max 2-CSPs encompass\
  \ Max Dicut, Max 2-Lin,\nMax 2-Sat, Max-"
