  \ Abstract\nThe graph homomorphism problem (HOM) asks whether the vertices of a\
  \ given $n$-vertex graph $G$ can be mapped to the vertices of a given $h$-vertex\
  \ graph $H$ such that each edge of $G$ is mapped to an edge of $H$."
