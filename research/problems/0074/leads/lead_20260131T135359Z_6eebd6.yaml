notes: '[Exa] Edge density and minimum degree thresholds for H-free graphs with

  unbounded chromatic number

  Zhuo Wu∗ Yisai Xue†

  Abstract

  The chromatic threshold δχ(H) of a graph H is the infimum of d > 0 such that the
  chromatic

  number of every n-vertex H-free graph with minimum degree at least dn is bounded
  in terms of H

  and d. A breakthrough result of Allen, B¨ottcher, Griffiths, Kohayakawa, and Morris
  determined

  δχ(H) for every graph H; in particular, if χ(H) = r ≥ 3, then δχ(H) ∈ { r−3

