notes: "[Exa] # Squarefree\n\n[Download Wolfram Notebook] \n\nA number is said to\
  \ be squarefree (or sometimes quadratfrei; Shanks 1993) if its [prime] decomposition\
  \ contains no repeated factors.\nAll [primes] are therefore trivially squarefree.\
  \ The\nnumber 1 is by convention taken to be squarefree. The squarefree numbers\
  \ are 1, 2,\n3, 5, 6, 7, 10, 11, 13, 14, 15, ... (OEIS [A005117]).\nThe [squareful]\
  \ numbers (i.e., those that contain at\nleast one square) are 4, 8, 9,"
