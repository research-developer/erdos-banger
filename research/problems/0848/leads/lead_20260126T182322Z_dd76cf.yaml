notes: '[Exa] ON A ⊆ [N] SUCH THAT ab + 1 IS NEVER SQUAREFREE FOR a, b ∈ A

  MEHTAAB SAWHNEY

  1. Statement of result

  In this short note, we address the following question of Erdős [2]. We remark that
  substantial progress

  towards this problem was made by van Doorn, Weisenberg and Cambie [1].

  Proposition 1.1. There exists an integer N0 such that if N ≥ N0 then the following
  holds. Let A ⊆ [N]

  with the property that if a, b ∈ A then ab + 1 is not squarefree. Then |A| ≤ |{n
  ∈ [N] : n ≡ 7 mod 25}|.

