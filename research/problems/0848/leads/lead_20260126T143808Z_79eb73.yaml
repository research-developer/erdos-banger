notes: |
  Sawhney proved: for sufficiently large N, if |A| ≥ (1/25 - c)N for some c>0,
  then A ⊆ {n ≡ 7 mod 25} or {n ≡ 18 mod 25}.
  This resolves the conjecture for large N. Need explicit N_0 for finite verification.
