name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml
            .python-version
          cache-suffix: ${{ matrix.python-version }}

      - name: Install Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Verify lockfile is up-to-date
        run: uv lock --check

      - name: Install dependencies
        run: uv sync --frozen

      - name: Pre-commit (repo hygiene)
        run: uv run --frozen pre-commit run --all-files --show-diff-on-failure
        env:
          SKIP: ruff-check,ruff-format,mypy

      - name: Lint
        run: uv run --frozen ruff check .

      - name: Format (check)
        run: uv run --frozen ruff format . --check

      - name: Type check
        run: uv run --frozen mypy src/ tests/

      - name: Tests (no Lean, no network)
        run: uv run --frozen pytest --cov=erdos --cov-report=xml --cov-fail-under=80 -m "not requires_lean and not requires_network"
        env:
          COLUMNS: "200"  # Prevent Rich from truncating help output

      - name: Smoke test
        run: make smoke

      - name: Build (sdist + wheel)
        run: uv build

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}

  test-with-lean:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Cache elan and mathlib
        uses: actions/cache@v5
        with:
          path: |
            ~/.elan
            formal/lean/.lake
          key: lean-${{ hashFiles('formal/lean/lean-toolchain', 'formal/lean/lakefile.lean') }}
          restore-keys: |
            lean-

      - name: Install elan and Lean
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Build formal Lean project
        run: |
          cd formal/lean
          lean --version
          lake --version
          lake update
          lake build

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.11"
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml
          cache-suffix: lean

      - name: Install Python 3.11
        run: uv python install 3.11

      - name: Verify lockfile is up-to-date
        run: uv lock --check

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run Lean-dependent tests
        run: |
          set +e
          uv run --frozen pytest -m "requires_lean"
          status=$?
          if [ $status -eq 5 ]; then
            echo "No tests collected for marker 'requires_lean'; skipping."
            exit 0
          fi
          exit $status
        env:
          COLUMNS: "200"  # Prevent Rich from truncating help output
