name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml
            .python-version
          cache-suffix: ${{ matrix.python-version }}

      - name: Install Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Verify lockfile is up-to-date
        run: uv lock --check

      - name: Install dependencies
        run: uv sync --frozen

      - name: Pre-commit (repo hygiene)
        run: uv run --frozen pre-commit run --all-files --show-diff-on-failure
        env:
          SKIP: ruff-check,ruff-format,mypy

      - name: Lint
        run: uv run --frozen ruff check .

      - name: Format (check)
        run: uv run --frozen ruff format . --check

      - name: Type check
        run: uv run --frozen mypy src/ tests/

      - name: Tests (no Lean, no network)
        run: uv run --frozen pytest --cov=erdos --cov-report=xml --cov-fail-under=80 -m "not requires_lean and not requires_network" --color=no
        env:
          COLUMNS: "200"
          NO_COLOR: "1"  # Prevent Rich from truncating help panel content

      - name: Smoke test
        run: make smoke

      - name: Build (sdist + wheel)
        run: uv build

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}

  docs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.11"
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml
            .python-version
          cache-suffix: docs

      - name: Install Python 3.11
        run: uv python install 3.11

      - name: Verify lockfile is up-to-date
        run: uv lock --check

      - name: Install docs dependencies
        run: uv sync --frozen --extra docs

      - name: Build docs (strict)
        run: uv run --frozen mkdocs build --strict

  test-mcp:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.11"
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml
            .python-version
          cache-suffix: mcp

      - name: Install Python 3.11
        run: uv python install 3.11

      - name: Verify lockfile is up-to-date
        run: uv lock --check

      - name: Install dependencies with MCP extra
        run: uv sync --frozen --extra mcp

      - name: Run MCP tests
        run: uv run --frozen pytest tests/unit/mcp/test_tools.py tests/integration/test_mcp_server.py -v --color=no
        env:
          COLUMNS: "200"
          NO_COLOR: "1"
