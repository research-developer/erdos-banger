# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json

language: "en-US"

reviews:
  profile: "assertive" # More thorough feedback
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main
      - dev

  path_instructions:
    - path: "src/erdos/**/*.py"
      instructions: |
        This is a Python CLI toolkit for Erdős mathematical problem research.
        - Ensure strict type hints (mypy strict mode)
        - Follow Pydantic v2 patterns for models
        - Check for proper error handling in CLI commands
    - path: "tests/**/*.py"
      instructions: |
        - Verify tests follow pytest best practices
        - Check that fixtures are used appropriately
        - Ensure proper use of markers (e2e, requires_lean, requires_network)
    - path: "docs/specs/**/*.md"
      instructions: |
        - These are implementation specs - check for internal consistency
        - Verify code examples are syntactically correct
        - Flag any contradictions between specs

chat:
  auto_reply: true

knowledge_base:
  learnings:
    scope: auto
  issues:
    scope: auto
  code_guidelines:
    enabled: true
